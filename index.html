<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Something 👀</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="main-container">
    <div id="app">
        <h1>Something is waiting 👀</h1>
        <p class="subtext">Only a few people can access this…</p>
        <p class="hint">Check what I sent you earlier 👀</p>

        <div class="input-group">
            <input 
                id="codeInput" 
                placeholder="Enter it here…" 
                autocomplete="off"
                type="text"
            />
            <button onclick="checkCode()">Continue</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
<script>
    // Handles the "Enter" key on mobile keyboards
    document.getElementById("codeInput").addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            checkCode();
            this.blur(); // Hides mobile keyboard after submit
        }
    });
</script>

</body>
</html>
